<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="screen-orientation" content="landscape">
    <title>Sítio da Mineirinha</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- ============ AUTH SCREEN ============ -->
    <div id="auth-screen" class="screen active">
        <div class="auth-bg">
            <div class="auth-clouds">
                <div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>
            </div>
            <div class="auth-ground"></div>
        </div>
        <div class="auth-wrapper">
            <div class="auth-header">
                <img src="assets/structures/farmhouse.png" class="auth-farmhouse" alt="">
                <img src="assets/character/rotations/south.png" class="auth-char" alt="Mineirinha">
            </div>
            <h1 class="auth-title">Sítio da Mineirinha</h1>
            <p class="auth-subtitle">Plante, cozinhe e venda farofa!</p>
            <div class="auth-box">
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">Entrar</button>
                    <button class="auth-tab" data-tab="register">Cadastrar</button>
                </div>
                <form id="login-form" class="auth-form active">
                    <div class="input-group"><label>E-mail</label><input type="email" id="login-email" required placeholder="seu@email.com" autocomplete="email"></div>
                    <div class="input-group"><label>Senha</label><input type="password" id="login-password" required placeholder="••••••••" autocomplete="current-password"></div>
                    <button type="submit" class="auth-btn">Jogar!</button>
                    <button type="button" class="auth-link" id="btn-forgot">Esqueci minha senha</button>
                </form>
                <form id="register-form" class="auth-form">
                    <div class="input-group"><label>Nome</label><input type="text" id="reg-name" required placeholder="Mineirinha123" autocomplete="username"></div>
                    <div class="input-group"><label>E-mail</label><input type="email" id="reg-email" required placeholder="seu@email.com" autocomplete="email"></div>
                    <div class="input-group"><label>Senha</label><input type="password" id="reg-password" required placeholder="Mínimo 6 caracteres" minlength="6" autocomplete="new-password"></div>
                    <button type="submit" class="auth-btn">Criar Conta</button>
                </form>
                <div id="auth-error" class="auth-error hidden"></div>
                <div id="auth-success" class="auth-success hidden"></div>
            </div>
        </div>
    </div>

    <!-- ============ GAME SCREEN ============ -->
    <div id="game-screen" class="screen">
        <!-- HUD Top Bar -->
        <div id="hud">
            <div class="hud-left">
                <div class="hud-avatar"><img src="assets/character/rotations/south.png" class="hud-avatar-img" alt=""></div>
                <span class="hud-player" id="hud-player-name">Jogador</span>
            </div>
            <div class="hud-center">
                <div class="hud-item" title="Milho"><img src="assets/crops/corn_stage_4.png" class="hud-icon"><span id="hud-corn">0</span></div>
                <div class="hud-item" title="Farinha"><span class="hud-icon-emoji">🌾</span><span id="hud-flour">0</span></div>
                <div class="hud-item" title="Farofa"><img src="assets/products/packaged_farofa.png" class="hud-icon"><span id="hud-farofa">0</span></div>
            </div>
            <div class="hud-right">
                <div class="hud-coins" id="hud-coins"><span class="coin-symbol">$</span><span id="hud-coin-count">0</span></div>
                <button class="hud-btn-shop" id="btn-shop" title="Melhorias">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1l2 3h5l-4 3 1.5 5L8 9.5 3.5 12 5 7 1 4h5z"/></svg>
                </button>
                <button class="hud-btn-logout" id="btn-logout" title="Sair">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M2 2h5v2H4v8h3v2H2V2zm7 3l4 3-4 3V9H6V7h3V5z"/></svg>
                </button>
            </div>
        </div>

        <!-- Main Game Layout: sidebar + world -->
        <div id="game-layout">
            <!-- Left Scene Nav (vertical) -->
            <nav id="scene-nav">
                <button class="scene-btn active" data-scene="farm">
                    <span class="nav-icon">🌱</span><span class="nav-text">Roça</span>
                </button>
                <button class="scene-btn" data-scene="process">
                    <span class="nav-icon">⚙️</span><span class="nav-text">Moinho</span>
                </button>
                <button class="scene-btn" data-scene="cooking">
                    <span class="nav-icon">🍳</span><span class="nav-text">Cozinha</span>
                </button>
                <button class="scene-btn" data-scene="sell">
                    <span class="nav-icon">🏪</span><span class="nav-text">Mercado</span>
                </button>
            </nav>

            <!-- Game World -->
            <div id="game-world">
                <div id="speech" class="hidden"><span id="speech-msg"></span></div>

                <!-- ====== SCENES ====== -->

                <!-- FARM -->
                <div id="scene-farm" class="scene active">
                    <div class="scene-bg farm-bg"></div>
                    <div class="scene-ambient">
                        <div class="pollen p1"></div><div class="pollen p2"></div><div class="pollen p3"></div>
                        <div class="pollen p4"></div><div class="pollen p5"></div><div class="pollen p6"></div>
                    </div>
                    <div class="scene-content farm-layout">
                        <div class="farm-left">
                            <img src="assets/structures/farmhouse.png" class="farm-house" alt="">
                            <div class="scene-char" id="char-farm">
                                <img src="assets/character/rotations/south.png" class="char-sprite" alt="">
                                <div class="char-shadow"></div>
                            </div>
                        </div>
                        <div class="farm-center">
                            <div class="tile-grid" id="farm-grid"></div>
                        </div>
                        <div class="farm-right">
                            <div class="farm-tools" id="farm-tools">
                                <button class="tool-btn active" data-tool="plant" title="Plantar"><span class="tool-ico">🌱</span></button>
                                <button class="tool-btn" data-tool="water" title="Regar"><span class="tool-ico">💧</span></button>
                                <button class="tool-btn" data-tool="harvest" title="Colher"><span class="tool-ico">🫳</span></button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- PROCESS -->
                <div id="scene-process" class="scene">
                    <div class="scene-bg workshop-bg"></div>
                    <div class="scene-ambient">
                        <div class="dust d1"></div><div class="dust d2"></div><div class="dust d3"></div>
                        <div class="dust d4"></div><div class="dust d5"></div>
                    </div>
                    <div class="scene-content station-layout">
                        <div class="scene-char" id="char-process">
                            <img src="assets/character/rotations/east.png" class="char-sprite" alt="">
                            <div class="char-shadow"></div>
                        </div>
                        <div class="machine-area">
                            <img src="assets/machines/corn_grinder.png" class="machine-sprite" id="grinder-sprite" alt="Moinho">
                            <div class="machine-particles" id="grinder-particles"></div>
                        </div>
                        <div class="station-panel wood-panel">
                            <div class="panel-title">Moer Milho</div>
                            <div class="panel-io">
                                <div class="io-item"><img src="assets/crops/corn_stage_4.png" class="io-icon"><span class="io-count" id="proc-corn">0</span></div>
                                <div class="io-arrow">→</div>
                                <div class="io-item"><span class="io-emoji">🌾</span></div>
                            </div>
                            <button class="action-btn" id="btn-grind">Moer</button>
                        </div>
                    </div>
                </div>

                <!-- COOKING -->
                <div id="scene-cooking" class="scene">
                    <div class="scene-bg kitchen-bg"></div>
                    <div class="scene-ambient">
                        <div class="heat-shimmer"></div>
                    </div>
                    <div class="scene-content station-layout">
                        <div class="scene-char" id="char-cooking">
                            <img src="assets/character/rotations/north.png" class="char-sprite" alt="">
                            <div class="char-shadow"></div>
                        </div>
                        <div class="cook-area">
                            <div class="kitchen-shelf">
                                <div class="shelf-jar j1"></div><div class="shelf-jar j2"></div><div class="shelf-jar j3"></div>
                            </div>
                            <div class="stove" id="stove">
                                <div class="stove-body"></div>
                                <div class="pan"><div class="pan-contents" id="pan-contents"></div></div>
                                <div class="fire"><div class="flame f1"></div><div class="flame f2"></div><div class="flame f3"></div></div>
                                <div class="steam"><div class="steam-p s1"></div><div class="steam-p s2"></div><div class="steam-p s3"></div></div>
                            </div>
                            <div class="timing-wrap" id="cook-timing">
                                <div class="timing-bar">
                                    <div class="tz tz-raw"></div><div class="tz tz-good"></div><div class="tz tz-perfect"></div><div class="tz tz-good2"></div><div class="tz tz-burn"></div>
                                    <div class="timing-needle" id="timing-needle"></div>
                                </div>
                            </div>
                        </div>
                        <div class="station-panel wood-panel">
                            <div class="panel-title">Cozinhar</div>
                            <div class="ing-row" id="ing-row">
                                <button class="ing-btn selected" data-ing="manteiga">🧈</button>
                                <button class="ing-btn" data-ing="alho"><img src="assets/ingredients/garlic.png" class="ing-img" alt=""></button>
                                <button class="ing-btn" data-ing="cebola"><img src="assets/ingredients/onion.png" class="ing-img" alt=""></button>
                                <button class="ing-btn" data-ing="bacon">🥓</button>
                            </div>
                            <div class="panel-io">
                                <div class="io-item"><span class="io-emoji">🌾</span><span class="io-count" id="cook-flour">0</span></div>
                            </div>
                            <button class="action-btn" id="btn-cook">Torrar</button>
                            <button class="action-btn action-stop hidden" id="btn-cook-stop">PARAR!</button>
                            <div id="cook-result" class="cook-result hidden"></div>
                        </div>
                    </div>
                </div>

                <!-- SELL -->
                <div id="scene-sell" class="scene">
                    <div class="scene-bg market-bg"></div>
                    <div class="scene-ambient">
                        <div class="leaf l1"></div><div class="leaf l2"></div><div class="leaf l3"></div>
                    </div>
                    <div class="scene-content station-layout">
                        <div class="scene-char" id="char-sell">
                            <img src="assets/character/rotations/south.png" class="char-sprite" alt="">
                            <div class="char-shadow"></div>
                        </div>
                        <div class="market-area">
                            <div class="market-stall">
                                <div class="stall-awning"></div>
                                <div class="stall-body">
                                    <img src="assets/products/packaged_farofa.png" class="stall-product" id="stall-product" alt="Farofa">
                                    <div class="stall-sparkle" id="stall-sparkle"></div>
                                </div>
                                <div class="stall-base"></div>
                            </div>
                            <div class="market-demand" id="market-demand">
                                <span class="demand-label">Demanda:</span>
                                <span class="demand-val" id="demand-val">Normal</span>
                            </div>
                        </div>
                        <div class="station-panel wood-panel">
                            <div class="panel-title">Vender</div>
                            <div class="panel-io">
                                <div class="io-item"><img src="assets/products/packaged_farofa.png" class="io-icon"><span class="io-count" id="sell-farofa">0</span></div>
                                <div class="io-price"><span class="coin-symbol">$</span><span id="sell-price-val">10</span></div>
                            </div>
                            <button class="action-btn" id="btn-sell">Vender 1</button>
                            <button class="action-btn action-gold" id="btn-sell-all">Vender Tudo</button>
                            <div class="sell-stats">
                                <span class="stat-item">Vendidos: <span id="stat-sold">0</span></span>
                            </div>
                        </div>
                    </div>
                    <div id="coin-anim-container"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Shop Overlay -->
    <div id="shop-overlay" class="overlay hidden">
        <div class="shop-panel">
            <div class="shop-header">
                <div class="shop-title">Melhorias do Sítio</div>
                <button class="shop-close" id="shop-close">✕</button>
            </div>
            <div class="shop-grid" id="shop-grid"></div>
        </div>
    </div>

    <!-- Floating notifications -->
    <div id="notifs"></div>

    <script src="script.js"></script>
</body>
</html>
