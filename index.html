<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sítio da Mineirinha</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- ============ AUTH SCREEN ============ -->
    <div id="auth-screen" class="screen active">
        <div class="auth-wrapper">
            <div class="auth-logo">
                <div class="pixel-logo">🌽</div>
                <h1 class="auth-title">Sítio da Mineirinha</h1>
                <p class="auth-subtitle">Plante, cozinhe e venda farofa!</p>
            </div>
            <div class="auth-box">
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">Entrar</button>
                    <button class="auth-tab" data-tab="register">Cadastrar</button>
                </div>
                <!-- Login Form -->
                <form id="login-form" class="auth-form active">
                    <div class="input-group">
                        <label>E-mail</label>
                        <input type="email" id="login-email" required placeholder="seu@email.com" autocomplete="email">
                    </div>
                    <div class="input-group">
                        <label>Senha</label>
                        <input type="password" id="login-password" required placeholder="••••••••" autocomplete="current-password">
                    </div>
                    <button type="submit" class="auth-btn">🎮 Jogar!</button>
                </form>
                <!-- Register Form -->
                <form id="register-form" class="auth-form">
                    <div class="input-group">
                        <label>Nome no Jogo</label>
                        <input type="text" id="reg-name" required placeholder="Mineirinha123" autocomplete="username">
                    </div>
                    <div class="input-group">
                        <label>E-mail</label>
                        <input type="email" id="reg-email" required placeholder="seu@email.com" autocomplete="email">
                    </div>
                    <div class="input-group">
                        <label>Senha</label>
                        <input type="password" id="reg-password" required placeholder="Mínimo 6 caracteres" minlength="6" autocomplete="new-password">
                    </div>
                    <button type="submit" class="auth-btn">📝 Criar Conta</button>
                </form>
                <div id="auth-error" class="auth-error hidden"></div>
                <div id="auth-success" class="auth-success hidden"></div>
            </div>
        </div>
    </div>

    <!-- ============ GAME SCREEN ============ -->
    <div id="game-screen" class="screen">
        <!-- Top HUD -->
        <div id="hud-top">
            <div class="hud-left">
                <span class="hud-player" id="hud-player-name">Jogador</span>
            </div>
            <div class="hud-center">
                <div class="hud-item" title="Milho">🌽<span id="hud-corn">0</span></div>
                <div class="hud-item" title="Farinha">🌾<span id="hud-flour">0</span></div>
                <div class="hud-item" title="Farofa">🥣<span id="hud-farofa">0</span></div>
            </div>
            <div class="hud-right">
                <div class="hud-coins" id="hud-coins">🪙 <span id="hud-coin-count">0</span></div>
                <button class="hud-btn-logout" id="btn-logout" title="Sair">🚪</button>
            </div>
        </div>

        <!-- Game Canvas Area -->
        <div id="game-area">
            <!-- Mineirinha (present in all scenes) -->
            <div id="mineirinha" class="mineirinha">
                <div class="px-char">
                    <div class="px-hat"></div>
                    <div class="px-hair-l"></div>
                    <div class="px-hair-r"></div>
                    <div class="px-face">
                        <div class="px-eye px-eye-l"></div>
                        <div class="px-eye px-eye-r"></div>
                        <div class="px-freckle px-freckle-1"></div>
                        <div class="px-freckle px-freckle-2"></div>
                        <div class="px-freckle px-freckle-3"></div>
                        <div class="px-freckle px-freckle-4"></div>
                        <div class="px-mouth"></div>
                    </div>
                    <div class="px-body">
                        <div class="px-apron"></div>
                    </div>
                    <div class="px-arm px-arm-l"></div>
                    <div class="px-arm px-arm-r"></div>
                    <div class="px-boot px-boot-l"></div>
                    <div class="px-boot px-boot-r"></div>
                </div>
                <div class="px-shadow"></div>
            </div>

            <!-- Speech bubble -->
            <div id="speech" class="speech hidden">
                <span id="speech-msg"></span>
            </div>

            <!-- ====== SCENE: FARM ====== -->
            <div id="scene-farm" class="game-scene active">
                <div class="farm-bg">
                    <div class="farm-ground"></div>
                    <div class="farm-grid" id="farm-grid">
                        <!-- 3x3 grid generated by JS -->
                    </div>
                    <div class="farm-toolbar">
                        <button class="tool-btn active" data-tool="plant" title="Plantar">🌱</button>
                        <button class="tool-btn" data-tool="water" title="Regar">💧</button>
                        <button class="tool-btn" data-tool="harvest" title="Colher">🌾</button>
                    </div>
                </div>
            </div>

            <!-- ====== SCENE: PROCESS ====== -->
            <div id="scene-process" class="game-scene">
                <div class="process-bg">
                    <div class="mill-machine" id="mill-machine">
                        <div class="mill-top">
                            <div class="mill-funnel"></div>
                            <div class="mill-corn-slot" id="mill-corn-slot">🌽</div>
                        </div>
                        <div class="mill-body">
                            <div class="mill-gear" id="mill-gear"></div>
                            <div class="mill-gear mill-gear-2" id="mill-gear-2"></div>
                        </div>
                        <div class="mill-base">
                            <div class="mill-output" id="mill-output">🌾</div>
                        </div>
                    </div>
                    <div class="process-controls">
                        <p class="process-stock">Milho: <strong id="proc-corn">0</strong></p>
                        <button class="game-btn btn-process" id="btn-grind">⚙️ Moer Milho</button>
                    </div>
                </div>
            </div>

            <!-- ====== SCENE: COOKING ====== -->
            <div id="scene-cooking" class="game-scene">
                <div class="cooking-bg">
                    <div class="stove" id="stove">
                        <div class="stove-body"></div>
                        <div class="pan" id="pan">
                            <div class="pan-contents" id="pan-contents"></div>
                            <div class="pan-handle"></div>
                        </div>
                        <div class="fire" id="stove-fire">
                            <div class="flame f1">🔥</div>
                            <div class="flame f2">🔥</div>
                            <div class="flame f3">🔥</div>
                        </div>
                    </div>
                    <!-- Timing bar for toasting -->
                    <div class="cook-timing" id="cook-timing">
                        <div class="timing-bar">
                            <div class="timing-zone timing-raw"></div>
                            <div class="timing-zone timing-good"></div>
                            <div class="timing-zone timing-perfect"></div>
                            <div class="timing-zone timing-good2"></div>
                            <div class="timing-zone timing-burn"></div>
                            <div class="timing-needle" id="timing-needle"></div>
                        </div>
                    </div>
                    <div class="cook-controls">
                        <div class="ingredient-row" id="ingredient-row">
                            <button class="ing-btn selected" data-ing="manteiga">🧈</button>
                            <button class="ing-btn" data-ing="alho">🧄</button>
                            <button class="ing-btn" data-ing="cebola">🧅</button>
                            <button class="ing-btn" data-ing="bacon">🥓</button>
                        </div>
                        <p class="cook-stock">Farinha: <strong id="cook-flour">0</strong></p>
                        <button class="game-btn btn-cook" id="btn-cook">🔥 Torrar & Cozinhar</button>
                        <button class="game-btn btn-stop hidden" id="btn-cook-stop">✋ PARAR!</button>
                    </div>
                    <div id="cook-result" class="cook-result hidden"></div>
                </div>
            </div>

            <!-- ====== SCENE: SELL ====== -->
            <div id="scene-sell" class="game-scene">
                <div class="sell-bg">
                    <div class="market-stall">
                        <div class="stall-roof"></div>
                        <div class="stall-counter">
                            <div class="stall-product" id="stall-product">
                                <div class="product-icon">🥣</div>
                                <div class="product-label">Farofa da Mineirinha</div>
                            </div>
                        </div>
                        <div class="stall-legs"></div>
                    </div>
                    <div class="sell-controls">
                        <p class="sell-stock">Farofa: <strong id="sell-farofa">0</strong></p>
                        <p class="sell-price">Preço: 🪙 <strong id="sell-price-val">10</strong></p>
                        <button class="game-btn btn-sell" id="btn-sell">💰 Vender 1</button>
                        <button class="game-btn btn-sell-all" id="btn-sell-all">💰 Vender Tudo</button>
                    </div>
                </div>
                <!-- Coin animation container -->
                <div id="coin-anim-container"></div>
            </div>
        </div>

        <!-- Bottom Nav -->
        <nav id="scene-nav">
            <button class="scene-btn active" data-scene="farm">🌱<span>Roça</span></button>
            <button class="scene-btn" data-scene="process">⚙️<span>Moinho</span></button>
            <button class="scene-btn" data-scene="cooking">🔥<span>Cozinha</span></button>
            <button class="scene-btn" data-scene="sell">🛒<span>Vender</span></button>
        </nav>
    </div>

    <!-- Floating notifications -->
    <div id="notifs"></div>

    <script src="script.js"></script>
</body>
</html>
